<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>טיפול בליד — FLOA</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin">

  <!-- מסך הזדהות -->
  <section id="authGate" class="auth-gate">
    <div class="auth-card">
      <h1>ניהול לידים</h1>
      <p>הכניסה למורשים בלבד. התחברו עם חשבון Google.</p>
      <button id="loginBtn" class="google-btn" type="button">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.2-3.9 6.7-9.6 6.7-16.9z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.4-.7-2.9-.7-4.6s.3-3.2.7-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.9-2.1 15.9-5.8l-7.1-5.5c-2 1.3-4.5 2.1-8.8 2.1-6.4 0-11.7-3.7-13.6-9.9l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
        התחברות עם Google
      </button>
      <p id="authDenied" class="auth-denied" hidden></p>
      <p id="authError" class="auth-error" hidden></p>
    </div>
  </section>

  <!-- מסך הטיפול -->
  <main id="appView" class="admin-wrap" hidden>
    <header class="admin-bar">
      <h1><span class="brand-mark">FLOA</span> · טיפול בליד</h1>
      <span class="spacer"></span>
      <span class="whoami" id="whoami"></span>
      <button class="a-btn ghost sm" type="button" data-logout>יציאה</button>
    </header>

    <a class="back-link" href="index.html">→ חזרה לרשימת הלידים</a>

    <p class="loading" id="loading">טוען…</p>
    <p class="empty" id="notfound" hidden>הליד לא נמצא.</p>

    <div class="detail-grid" id="detail" hidden>
      <section class="panel">
        <h2>פרטי הפנייה</h2>
        <div id="fields"></div>
        <div class="quick-actions" id="quickActions"></div>
      </section>

      <aside class="panel">
        <h2>טיפול</h2>
        <div class="form-field">
          <label for="status">סטטוס</label>
          <select id="status"></select>
        </div>
        <div class="form-field">
          <label for="notes">הערות פנימיות</label>
          <textarea id="notes" placeholder="סיכום שיחה, שלב הבא, כל מה שצריך לזכור…"></textarea>
        </div>
        <div class="save-row">
          <button class="a-btn primary" type="button" id="saveBtn">שמירה</button>
          <span class="saved-note" id="savedNote" hidden>נשמר ✓</span>
        </div>
        <p class="handled-meta" id="handledMeta"></p>
      </aside>
    </div>
  </main>

  <script type="module" src="../js/admin-lead.js"></script>
</body>
</html>
