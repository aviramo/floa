name = "floa-lead"
main = "src/index.js"
compatibility_date = "2025-01-01"

# The Worker is served from its own workers.dev address, NOT from api.floa.co.il.
#
# The reason is DNS. A Cloudflare route (api.floa.co.il/lead) only works if the
# floa.co.il zone is managed by Cloudflare, and it is not: the domain's
# nameservers point at sitesdepot and its A records at GitHub Pages. This file
# used to claim a route on api.floa.co.il, a host that never resolved, so every
# lead failed in the browser before it reached anything at all.
#
# workers.dev needs no DNS. The address is never seen by a visitor, because it is
# only the target of a background fetch, and the Worker refuses any origin that
# is not floa.co.il (see ALLOWED_ORIGINS in src/index.js).
#
# Deployed at https://floa-lead.floa-il.workers.dev — this must match
# runtime.leadEndpoint in src/content/site.js.
workers_dev = true

# One address, not many. Preview URLs would publish this same endpoint on an
# extra hostname per version, which buys nothing here (there is one caller, the
# live site) and only widens what has to be reasoned about.
preview_urls = false

# Non-secret configuration. The API KEY IS NOT HERE. It is a secret, set with
# `wrangler secret put` and never committed. See README.md.
#
# LEAD_TO is where a lead lands, and it is also the Reply-To, so answering the
# email answers the person. LEAD_FROM must stay on floa.co.il: that is the domain
# verified in Resend (SPF + DKIM), and Resend will refuse to send as any other.
[vars]
LEAD_TO = "ofir.aviram@gmail.com"
LEAD_FROM = "FLOA <no-reply@floa.co.il>"
